<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pulse Wiki</title>
<style>
  :root { --bg:#0f1117; --panel:#171a23; --border:#262b38; --fg:#e6e9ef; --muted:#8b93a7;
          --accent:#5b8cff; --accent2:#7c5bff; --danger:#ff5b6e; --ok:#3ecf8e; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:14px; padding:12px 20px;
           background:linear-gradient(90deg,#141826,#171a23); border-bottom:1px solid var(--border);
           position:sticky; top:0; z-index:10; }
  header h1 { font-size:18px; margin:0; cursor:pointer; letter-spacing:.3px; }
  header h1 span { background:linear-gradient(90deg,var(--accent),var(--accent2));
                   -webkit-background-clip:text; background-clip:text; color:transparent; }
  #search { flex:1; max-width:420px; padding:8px 12px; border-radius:8px; border:1px solid var(--border);
            background:#0c0e14; color:var(--fg); }
  .spacer { flex:1; }
  button { font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--border);
           background:var(--panel); color:var(--fg); padding:8px 14px; transition:.15s; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.danger { color:var(--danger); }
  .layout { display:grid; grid-template-columns:280px 1fr; gap:0; min-height:calc(100vh - 57px); }
  aside { border-right:1px solid var(--border); padding:16px; background:#12141c; }
  aside h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 10px; }
  .plist a { display:block; padding:8px 10px; border-radius:7px; color:var(--fg); text-decoration:none;
             font-size:14px; }
  .plist a:hover { background:var(--panel); }
  .plist a small { display:block; color:var(--muted); font-size:11px; }
  main { padding:28px 36px; max-width:860px; }
  .meta { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .content h1,.content h2,.content h3 { line-height:1.25; }
  .content h1 { border-bottom:1px solid var(--border); padding-bottom:.3em; }
  .content code { background:#0c0e14; padding:2px 6px; border-radius:5px; font-size:.9em; }
  .content pre { background:#0c0e14; padding:14px; border-radius:8px; overflow:auto; border:1px solid var(--border); }
  .content pre code { background:none; padding:0; }
  .content blockquote { border-left:3px solid var(--accent); margin:0; padding:4px 16px; color:var(--muted); }
  .content a { color:var(--accent); }
  .content img { max-width:100%; border-radius:8px; border:1px solid var(--border); }
  .content del { color:var(--muted); }
  .content hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .content table { border-collapse:collapse; width:100%; margin:14px 0; font-size:14px; }
  .content th, .content td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
  .content th { background:#0c0e14; }
  .content tbody tr:nth-child(even) { background:#13151d; }
  .revlist a { display:block; padding:10px 12px; border-radius:8px; color:var(--fg); text-decoration:none;
               border:1px solid var(--border); margin-bottom:8px; }
  .revlist a:hover { border-color:var(--accent); }
  .revlist small { color:var(--muted); }
  .banner { background:#1a2030; border:1px solid var(--accent); border-radius:8px; padding:10px 14px;
            margin-bottom:18px; font-size:14px; }
  .toolbar { display:flex; flex-wrap:wrap; gap:4px; margin:6px 0 10px; }
  .toolbar button { padding:6px 9px; font-size:13px; min-width:34px; }
  .toolbar .sep { width:1px; background:var(--border); margin:2px 4px; }
  .edgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
  .edgrid textarea { min-height:460px; margin:0; }
  .pane-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
  .preview { min-height:460px; max-height:72vh; overflow:auto; padding:6px 16px;
             border:1px solid var(--border); border-radius:8px; background:#0c0e14; }
  .preview:empty::after { content:"Preview appears here…"; color:var(--muted); }
  @media (max-width:820px){ .edgrid { grid-template-columns:1fr; } .edgrid textarea,.preview { min-height:240px; } }
  input[type=text], textarea { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border);
            background:#0c0e14; color:var(--fg); font:inherit; }
  textarea { min-height:420px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; resize:vertical; }
  label { display:block; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
          margin:16px 0 6px; }
  .row { display:flex; gap:10px; align-items:center; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center;
              justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px;
           width:340px; }
  .modal h3 { margin:0 0 14px; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 18px;
           border-radius:8px; background:var(--panel); border:1px solid var(--border); z-index:60; }
  .toast.err { border-color:var(--danger); color:var(--danger); }
  .toast.ok { border-color:var(--ok); color:var(--ok); }
  .empty { color:var(--muted); padding:40px 0; text-align:center; }
  .hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1 onclick="go('/')">⚡ <span>Pulse Wiki</span></h1>
  <input id="search" type="text" placeholder="Search pages…  (Enter)" />
  <div class="spacer"></div>
  <button id="newBtn" class="primary hidden" onclick="go('/new')">+ New Page</button>
  <button id="authBtn" onclick="onAuthBtn()">Login</button>
</header>

<div class="layout">
  <aside>
    <h2>Pages</h2>
    <div id="plist" class="plist"></div>
  </aside>
  <main id="view"></main>
</div>

<div id="modalHost"></div>
<script>
const API = "";                       // mismo origen
let TOKEN = localStorage.getItem("wiki_token") || null;
let USER  = localStorage.getItem("wiki_user")  || null;

/* ---------- helpers ---------- */
function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, kind){ const t=document.createElement('div'); t.className='toast '+(kind||'');
  t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2600); }
function go(path){ location.hash = '#'+path; }

async function api(path, opts={}){
  const headers = opts.headers || {};
  if (opts.body) headers['Content-Type']='application/json';
  if (TOKEN) headers['Authorization']='Bearer '+TOKEN;
  const res = await fetch(API+path, {...opts, headers});
  if (res.status===401){ logout(); throw new Error('Not authorized — please log in'); }
  if (!res.ok){
    let m; try{ m=(await res.json()).message; }catch{ m=res.statusText; }
    throw new Error(m || ('HTTP '+res.status));
  }
  return res.status===204 ? null : res.json();
}

/* ---------- markdown (XSS-safe: text is escaped BEFORE formatting) ---------- */
function md(src){
  // Inline formatting. Escapes HTML first, so URLs/quotes can't break out.
  const inline = raw => esc(raw)
    .replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, '<img alt="$1" src="$2" />')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/~~([^~]+)~~/g, '<del>$1</del>');
  const isSep = s => /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(s);
  const cells = r => r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());

  const lines = src.replace(/\r/g,'').split('\n');
  let html='', i=0;
  while (i < lines.length){
    const line = lines[i];
    // fenced code block
    if (line.trim().startsWith('```')){
      i++; let code='';
      while (i<lines.length && !lines[i].trim().startsWith('```')){ code+=lines[i]+'\n'; i++; }
      i++; html+='<pre><code>'+esc(code)+'</code></pre>'; continue;
    }
    // table (header row + separator row)
    if (line.includes('|') && i+1<lines.length && isSep(lines[i+1])){
      const head = cells(line); i+=2; let body='';
      while (i<lines.length && lines[i].includes('|') && lines[i].trim()!==''){
        body+='<tr>'+cells(lines[i]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; i++;
      }
      html+='<table><thead><tr>'+head.map(h=>'<th>'+inline(h)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';
      continue;
    }
    // horizontal rule
    if (/^\s*([-*_])\1{2,}\s*$/.test(line)){ html+='<hr/>'; i++; continue; }
    // heading h1..h6
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h){ const n=h[1].length; html+=`<h${n}>${inline(h[2])}</h${n}>`; i++; continue; }
    // blockquote (consecutive lines)
    if (/^\s*>\s?/.test(line)){
      let q='';
      while (i<lines.length && /^\s*>\s?/.test(lines[i])){ q+=inline(lines[i].replace(/^\s*>\s?/,''))+'<br/>'; i++; }
      html+='<blockquote>'+q+'</blockquote>'; continue;
    }
    // unordered list
    if (/^\s*[-*+]\s+/.test(line)){
      let items='';
      while (i<lines.length && /^\s*[-*+]\s+/.test(lines[i])){ items+='<li>'+inline(lines[i].replace(/^\s*[-*+]\s+/,''))+'</li>'; i++; }
      html+='<ul>'+items+'</ul>'; continue;
    }
    // ordered list
    if (/^\s*\d+\.\s+/.test(line)){
      let items='';
      while (i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ items+='<li>'+inline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>'; i++; }
      html+='<ol>'+items+'</ol>'; continue;
    }
    // blank line
    if (line.trim()===''){ i++; continue; }
    // paragraph (join consecutive plain lines)
    let para=[];
    while (i<lines.length && lines[i].trim()!=='' && !/^\s*(#{1,6}\s|>|[-*+]\s|\d+\.\s|```|([-*_])\2{2,}\s*$)/.test(lines[i])
           && !(lines[i].includes('|') && i+1<lines.length && isSep(lines[i+1]))){
      para.push(inline(lines[i])); i++;
    }
    html+='<p>'+para.join('<br/>')+'</p>';
  }
  return html;
}

/* ---------- auth ---------- */
function isAuthed(){ return !!TOKEN; }
function refreshAuthUI(){
  document.getElementById('newBtn').classList.toggle('hidden', !isAuthed());
  document.getElementById('authBtn').textContent = isAuthed() ? ('Logout ('+USER+')') : 'Login';
}
function onAuthBtn(){ isAuthed() ? logout() : openLogin(); }
function logout(){ TOKEN=null; USER=null; localStorage.removeItem('wiki_token');
  localStorage.removeItem('wiki_user'); refreshAuthUI(); }
function openLogin(){
  document.getElementById('modalHost').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Login</h3>
        <label>Username</label><input id="lu" type="text" value="admin" />
        <label>Password</label><input id="lp" type="text" value="Str0ng-Pass1" />
        <div class="row" style="margin-top:18px">
          <button class="primary" onclick="doLogin()">Sign in</button>
          <button onclick="closeModal()">Cancel</button>
        </div>
        <p style="color:var(--muted);font-size:12px;margin-top:14px">Demo user is pre-filled.</p>
      </div>
    </div>`;
}
function closeModal(){ document.getElementById('modalHost').innerHTML=''; }
async function doLogin(){
  const username=document.getElementById('lu').value.trim();
  const password=document.getElementById('lp').value;
  try{
    const r = await api('/api/v1/auth/login', {method:'POST', body:JSON.stringify({username,password})});
    TOKEN=r.access_token; USER=username;
    localStorage.setItem('wiki_token',TOKEN); localStorage.setItem('wiki_user',USER);
    closeModal(); refreshAuthUI(); toast('Welcome, '+username,'ok'); render();
  }catch(e){ toast(e.message,'err'); }
}

/* ---------- views ---------- */
async function loadList(){
  try{
    const r = await api('/api/wiki/pages?size=100');
    const el = document.getElementById('plist');
    if (!r.data.length){ el.innerHTML='<div class="empty">No pages yet</div>'; return; }
    el.innerHTML = r.data.map(p =>
      `<a href="#/page/${encodeURIComponent(p.slug)}">${esc(p.title)}<small>by ${esc(p.author)}</small></a>`).join('');
  }catch(e){ /* listado no crítico */ }
}

async function viewPage(slug){
  const main=document.getElementById('view');
  try{
    const p = await api('/api/wiki/pages/'+encodeURIComponent(slug));
    const sl = encodeURIComponent(p.slug);
    const editControls = isAuthed()
      ? `<button onclick="go('/edit/${sl}')">Edit</button>
         <button class="danger" onclick="del('${sl}')">Delete</button>` : '';
    main.innerHTML = `
      <div class="row" style="justify-content:space-between">
        <h1 style="margin:0">${esc(p.title)}</h1>
        <div class="row">
          <button onclick="go('/history/${sl}')">History</button>
          ${editControls}
        </div>
      </div>
      <div class="meta">/${esc(p.slug)} · by ${esc(p.author)} · updated ${esc((p.updated_at||'').replace('T',' ').slice(0,19))}</div>
      <div class="content">${md(p.content)}</div>`;
  }catch(e){ main.innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

function editor(existing){
  if (!isAuthed()){ openLogin(); go('/'); return; }
  const main=document.getElementById('view');
  const p = existing || {title:'',content:'',slug:''};
  const isNew = !existing;
  const b = (a,label,title)=>`<button type="button" title="${title}" onclick="tb('${a}')">${label}</button>`;
  main.innerHTML = `
    <h1>${isNew?'New Page':'Edit: '+esc(p.title)}</h1>
    <label>Title</label><input id="eTitle" type="text" value="${esc(p.title)}" oninput="updatePreview()" />
    ${isNew?'<label>Slug (optional)</label><input id="eSlug" type="text" placeholder="auto from title" />':''}
    <label>Content (markdown)</label>
    <div class="toolbar">
      ${b('h1','H1','Heading 1')}${b('h2','H2','Heading 2')}
      <span class="sep"></span>
      ${b('bold','<b>B</b>','Bold')}${b('italic','<i>I</i>','Italic')}${b('strike','<s>S</s>','Strikethrough')}${b('code','&lt;/&gt;','Inline code')}
      <span class="sep"></span>
      ${b('ul','• List','Bullet list')}${b('ol','1. List','Numbered list')}${b('quote','❝','Quote')}
      <span class="sep"></span>
      ${b('link','🔗','Link')}${b('image','🖼','Image')}${b('table','▦','Table')}${b('codeblock','{ }','Code block')}
    </div>
    <div class="edgrid">
      <div>
        <div class="pane-label">Markdown</div>
        <textarea id="eContent" oninput="updatePreview()" spellcheck="false">${esc(p.content)}</textarea>
      </div>
      <div>
        <div class="pane-label">Live preview</div>
        <div id="ePreview" class="content preview"></div>
      </div>
    </div>
    <div class="row" style="margin-top:16px">
      <button class="primary" onclick="save(${isNew?'null':`'${encodeURIComponent(p.slug)}'`})">Save</button>
      <button onclick="history.back()">Cancel</button>
    </div>`;
  updatePreview();
}

/* ---------- live-preview editor helpers ---------- */
function getTA(){ return document.getElementById('eContent'); }
function updatePreview(){
  const pv=document.getElementById('ePreview'); const ta=getTA();
  if (pv && ta) pv.innerHTML = md(ta.value);
}
// Envuelve la selección (o inserta un placeholder) con prefijo/sufijo.
function wrapSel(pre, suf, ph){
  const ta=getTA(); const s=ta.selectionStart, e=ta.selectionEnd;
  const sel=ta.value.slice(s,e) || ph;
  ta.setRangeText(pre+sel+suf, s, e, 'end');
  ta.focus(); updatePreview();
}
// Antepone un marcador al inicio de la línea actual (encabezados, listas, citas).
function linePrefix(prefix){
  const ta=getTA(); const s=ta.selectionStart;
  const ls=ta.value.lastIndexOf('\n', s-1)+1;
  ta.setRangeText(prefix, ls, ls, 'end');
  ta.focus(); updatePreview();
}
// Inserta un bloque de texto en el cursor.
function insertBlock(text){
  const ta=getTA(); const s=ta.selectionStart;
  ta.setRangeText(text, s, s, 'end');
  ta.focus(); updatePreview();
}
function tb(action){
  switch(action){
    case 'h1': linePrefix('# '); break;
    case 'h2': linePrefix('## '); break;
    case 'bold': wrapSel('**','**','bold'); break;
    case 'italic': wrapSel('*','*','italic'); break;
    case 'strike': wrapSel('~~','~~','text'); break;
    case 'code': wrapSel('`','`','code'); break;
    case 'ul': linePrefix('- '); break;
    case 'ol': linePrefix('1. '); break;
    case 'quote': linePrefix('> '); break;
    case 'link': wrapSel('[','](https://)','text'); break;
    case 'image': insertBlock('![alt](https://)'); break;
    case 'table': insertBlock('\n| Column A | Column B |\n| --- | --- |\n| a1 | b1 |\n| a2 | b2 |\n'); break;
    case 'codeblock': insertBlock('\n```\ncode\n```\n'); break;
  }
}

async function save(slug){
  const title=document.getElementById('eTitle').value.trim();
  const content=document.getElementById('eContent').value;
  try{
    if (slug===null){
      const slugEl=document.getElementById('eSlug');
      const body={title, content};
      if (slugEl && slugEl.value.trim()) body.slug=slugEl.value.trim();
      const p = await api('/api/wiki/pages', {method:'POST', body:JSON.stringify(body)});
      toast('Created','ok'); go('/page/'+encodeURIComponent(p.slug));
    } else {
      const p = await api('/api/wiki/pages/'+slug, {method:'PUT', body:JSON.stringify({title, content})});
      toast('Saved','ok'); go('/page/'+encodeURIComponent(p.slug));
    }
    loadList();
  }catch(e){ toast(e.message,'err'); }
}

async function del(slug){
  if (!confirm('Delete this page?')) return;
  try{ await api('/api/wiki/pages/'+slug, {method:'DELETE'}); toast('Deleted','ok'); loadList(); go('/'); }
  catch(e){ toast(e.message,'err'); }
}

/* ---------- revision history ---------- */
function fmtDate(s){ return esc((s||'').replace('T',' ').slice(0,19)); }

async function showHistory(slug){
  const main=document.getElementById('view');
  try{
    const revs = await api('/api/wiki/pages/'+encodeURIComponent(slug)+'/revisions');
    const sl = encodeURIComponent(slug);
    main.innerHTML = `
      <div class="row" style="justify-content:space-between">
        <h1 style="margin:0">History</h1>
        <button onclick="go('/page/${sl}')">← Back to page</button>
      </div>
      <div class="meta">/${esc(slug)} · ${revs.length} revision(s)</div>
      <div class="revlist">${revs.map(r=>`
        <a href="#/rev/${sl}/${r.revision}">
          <strong>Revision ${r.revision}</strong> — ${esc(r.title)}
          <small> · by ${esc(r.author)} · ${fmtDate(r.created_at)}</small>
        </a>`).join('')}</div>`;
  }catch(e){ main.innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

async function viewRevision(slug, rev){
  const main=document.getElementById('view');
  const sl = encodeURIComponent(slug);
  try{
    const r = await api(`/api/wiki/pages/${sl}/revisions/${encodeURIComponent(rev)}`);
    const restoreBtn = isAuthed()
      ? `<button class="primary" onclick="restoreRev('${sl}',${r.revision})">Restore this version</button>` : '';
    main.innerHTML = `
      <div class="banner">📜 Viewing <strong>revision ${r.revision}</strong> (read-only).
        <a href="#/page/${sl}">View current version</a></div>
      <div class="row" style="justify-content:space-between">
        <h1 style="margin:0">${esc(r.title)}</h1>
        <div class="row">
          <button onclick="go('/history/${sl}')">← History</button>
          ${restoreBtn}
        </div>
      </div>
      <div class="meta">revision ${r.revision} · by ${esc(r.author)} · ${fmtDate(r.created_at)}</div>
      <div class="content">${md(r.content)}</div>`;
  }catch(e){ main.innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

async function restoreRev(slug, rev){
  if (!confirm('Restore revision '+rev+'? This creates a new revision with that content.')) return;
  try{
    await api(`/api/wiki/pages/${slug}/revisions/${rev}/restore`, {method:'POST'});
    toast('Restored revision '+rev,'ok'); loadList(); go('/page/'+slug);
  }catch(e){ toast(e.message,'err'); }
}

async function doSearch(q){
  const main=document.getElementById('view');
  try{
    const r = await api('/api/wiki/search?q='+encodeURIComponent(q));
    main.innerHTML = `<h1>Search: "${esc(q)}"</h1>` + (r.length
      ? '<div class="plist">'+r.map(p=>`<a href="#/page/${encodeURIComponent(p.slug)}">${esc(p.title)}<small>by ${esc(p.author)}</small></a>`).join('')+'</div>'
      : '<div class="empty">No matches</div>');
  }catch(e){ toast(e.message,'err'); }
}

/* ---------- router ---------- */
function render(){
  const h = location.hash.slice(1) || '/';
  const parts = h.split('/').filter(Boolean);   // e.g. ['page','welcome']
  if (parts.length===0){ viewPage('welcome'); return; }
  if (parts[0]==='page'){ viewPage(decodeURIComponent(parts[1])); }
  else if (parts[0]==='new'){ editor(null); }
  else if (parts[0]==='edit'){
    api('/api/wiki/pages/'+parts[1]).then(editor).catch(e=>toast(e.message,'err'));
  }
  else if (parts[0]==='history'){ showHistory(decodeURIComponent(parts[1])); }
  else if (parts[0]==='rev'){ viewRevision(decodeURIComponent(parts[1]), parts[2]); }
  else { viewPage('welcome'); }
}

document.getElementById('search').addEventListener('keydown', e=>{
  if (e.key==='Enter' && e.target.value.trim()){ doSearch(e.target.value.trim()); }
});
window.addEventListener('hashchange', render);
