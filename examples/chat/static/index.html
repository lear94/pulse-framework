<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pulse Chat</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e6e6;
         display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px 16px; background: #161a22; border-bottom: 1px solid #262c38;
           display: flex; gap: 8px; align-items: center; }
  header b { color: #6ea8fe; }
  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .msg { max-width: 70%; padding: 6px 10px; border-radius: 10px; background: #1c2230; }
  .msg .u { font-weight: 600; color: #9ecbff; margin-right: 6px; }
  .msg.me { align-self: flex-end; background: #234; }
  .sys { align-self: center; font-size: 13px; color: #8a93a3; font-style: italic; }
  form { display: flex; gap: 8px; padding: 12px 16px; background: #161a22; border-top: 1px solid #262c38; }
  input, button { font: inherit; padding: 9px 12px; border-radius: 8px; border: 1px solid #2c333f;
                  background: #0f1115; color: #e6e6e6; }
  input { flex: 1; }
  button { background: #2563eb; border-color: #2563eb; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <b>Pulse Chat</b>
    <span id="status">disconnected</span>
    <span style="flex:1"></span>
    <span id="who"></span>
  </header>
  <div id="log"></div>
  <form id="loginForm">
    <input id="username" placeholder="Pick a username…" autocomplete="off" />
    <button>Join</button>
  </form>
  <form id="chatForm" style="display:none">
    <input id="text" placeholder="Message…" autocomplete="off" />
    <button>Send</button>
  </form>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
const who = document.getElementById('who');
let me = null, ws = null;

function add(cls, html) {
  const el = document.createElement('div');
  el.className = cls; el.innerHTML = html;
  log.appendChild(el); log.scrollTop = log.scrollHeight;
}
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  if (!username) return;
  // 1) Pide un JWT al servidor (auth del framework).
  const r = await fetch('/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username })
  });
  if (!r.ok) { add('sys', 'login failed'); return; }
  const { token } = await r.json();
  me = username;

  // 2) Abre el WebSocket autenticado con ese token.
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);
  ws.onopen = () => {
    status.textContent = 'connected'; who.textContent = '@' + me;
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('chatForm').style.display = 'flex';
    document.getElementById('text').focus();
  };
  ws.onclose = () => { status.textContent = 'disconnected'; };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === 'system') return add('sys', `${esc(m.user)} ${esc(m.text)}`);
    const mine = m.user === me ? ' me' : '';
    add('msg' + mine, `<span class="u">${esc(m.user)}</span>${esc(m.text)}`);
  };
};

document.getElementById('chatForm').onsubmit = (e) => {
  e.preventDefault();
  const input = document.getElementById('text');
  const text = input.value.trim();
  if (text && ws && ws.readyState === WebSocket.OPEN) { ws.send(text); input.value = ''; }
};
</script>
</body>
</html>
