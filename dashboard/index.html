<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Pulse Mission Control</title>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 10px;
        }

        h2 {
            color: #94a3b8;
            margin-top: 30px;
        }

        .hud {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #64748b;
        }

        .card-value {
            font-size: 2rem;
            font-weight: bold;
            color: #f8fafc;
        }

        .card-value.green {
            color: #4ade80;
        }

        .card-value.red {
            color: #f87171;
        }

        .card-value.yellow {
            color: #facc15;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border: 1px solid #334155;
        }

        th {
            text-align: left;
            background: #0f172a;
            padding: 12px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        td {
            padding: 12px;
            border-top: 1px solid #334155;
            font-size: 0.9rem;
        }

        tr:hover {
            background: #334155;
        }

        .btn-replay {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-replay:hover {
            background: #0ea5e9;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .live {
            background: #064e3b;
            color: #34d399;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body></body>

</html>
